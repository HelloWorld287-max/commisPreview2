<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hero Layout</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<section class="hero">

  <div class="overlay"></div>

  <!-- Title -->
  <h1 class="title">Tes web/Preview</h1>

  <!-- Bottom Menu -->
  <div class="bottom-menu">
    
    <a href="projects.html">Projects</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </div>

  <!-- Social -->
  <div class="social">
  <a href="https://x.com/emitsukino" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
  <a href="https://www.instagram.com/832aniwork" target="_blank"><i class="fa-brands fa-instagram"></i></a>
  <a href="https://www.youtube.com/@832animation" target="_blank"><i class="fa-brands fa-youtube"></i></a>
  <a href="https://linkedin.com/in/username" target="_blank"><i class="fa-brands fa-linkedin-in"></i></a>
</div>

  <!-- CTA -->
  <div class="cta">
    <a href="#" id="openVideo">Play Showreel →</a>
  </div>

</section>



  <div class="video-popup" id="videoPopup">
  <div class="video-content">
    <span class="close-video">&times;</span>

    <iframe 
      id="youtubeFrame"
      src="https://youtube.com/embed/eeXgcM1k0rCkuDDU"
      frameborder="0"
      allow="autoplay; fullscreen"
      allowfullscreen>
    </iframe>

  </div>
</div>



  <script>
const openBtn = document.getElementById("openVideo");
const popup = document.getElementById("videoPopup");
const closeBtn = document.querySelector(".close-video");
const iframe = document.getElementById("youtubeFrame");

// GANTI LINK YOUTUBE DI SINI
const videoURL = "https://youtu.be/embed/eeXgcM1k0rCkuDDU";

openBtn.addEventListener("click", (e) => {
  e.preventDefault();
  popup.style.display = "flex";
  iframe.src = videoURL;
});

closeBtn.addEventListener("click", () => {
  popup.style.display = "none";
  iframe.src = ""; // stop video
});

// klik luar untuk close
popup.addEventListener("click", (e) => {
  if (e.target === popup) {
    popup.style.display = "none";
    iframe.src = "";
  }
});
</script>
</body>
</html>
